[mgr]
prepend_keymap = [
  { on = [
    "<C-k>",
  ], run = "arrow -1", desc = "Move cursor up" },
  { on = [
    "<C-j>",
  ], run = "arrow 1", desc = "Move cursor down" },
  { on = "<Enter>", run = "enter", desc = "Enter the child directory" },
  { on = [
    "g",
    "i",
  ], run = "plugin lazygit", desc = "Run lazygit" },
  { on = [
    'g',
    'r',
  ], run = 'plugin cd-git-root', desc = 'Go to git repo root' },
  { on = [
    'g',
    '.',
  ], run = 'cd ~/dotfiles', desc = 'Go ~/dotfiles' },
  { on = [
    'g',
    'D',
  ], run = 'cd ~/Documents', desc = 'Go ~/Documents' },
  { on = [
    "M",
  ], run = "plugin mount", desc = "Run mount" },
  { on = [
    "C",
  ], run = "plugin ouch", desc = "Compress with ouch" },
  { on = [
    "c",
    "r",
  ], run = "plugin path-from-root", desc = "Copies path from git root" },
  { on = [
    "y",
  ], run = [
    "yank",
    'plugin clipboard -- --action=copy',
  ], desc = 'Copy yanked files to the system clipboard' },
  { on = [
    "p",
  ], run = 'plugin clipboard -- --action=paste', desc = 'Paste files from the system clipboard into the current directory' },

  { on = [
    "1",
  ], run = "plugin relative-motions 1", desc = "Move in relative steps" },
  { on = [
    "2",
  ], run = "plugin relative-motions 2", desc = "Move in relative steps" },
  { on = [
    "3",
  ], run = "plugin relative-motions 3", desc = "Move in relative steps" },
  { on = [
    "4",
  ], run = "plugin relative-motions 4", desc = "Move in relative steps" },
  { on = [
    "5",
  ], run = "plugin relative-motions 5", desc = "Move in relative steps" },
  { on = [
    "6",
  ], run = "plugin relative-motions 6", desc = "Move in relative steps" },
  { on = [
    "7",
  ], run = "plugin relative-motions 7", desc = "Move in relative steps" },
  { on = [
    "8",
  ], run = "plugin relative-motions 8", desc = "Move in relative steps" },
  { on = [
    "9",
  ], run = "plugin relative-motions 9", desc = "Move in relative steps" },
]
